id = "kamal_deploy"
name = "Kamal Deploy"
version = "1.1.0"
description = "Show the deployed app version in the Django admin footer, and ship an interactive Kamal deploy wrapper (kamal.sh)."
target = "django-boilerplate"
edition = "pro"

# The admin footer template is intentionally NOT auto-installed: overwriting a project's
# admin/base_site.html would clobber its customisations. The footer line is a documented
# manual step (see post_install_notes).
files = [
  "apps/web/version.py",
  "kamal.sh",
]

# Register the version context processor (the plumbing is automated; the visible footer
# line is left for the user to place in their own admin template).
settings_append = 'TEMPLATES[0]["OPTIONS"]["context_processors"].append("apps.web.version.app_version")'

post_install_notes = """
1. Ensure the wrapper is executable: chmod +x kamal.sh
2. Deploy with: ./kamal.sh deploy   (interactive version selection; passes through to Kamal)
3. To show the version in the Django admin, add this to the {% block footer %} of your
   templates/admin/base_site.html (create it extending "admin/base.html" if you have none):

     {% if app_version %}
     <div style="text-align:center; color:var(--body-quiet-color); font-size:11px; padding:8px;">
       {{ app_version }}
     </div>
     {% endif %}

   The app_version context processor is registered for you; KAMAL_VERSION (set by Kamal at
   deploy) or the git tag / commit provides the value.
"""

# Eligible only where the project is actually set up for Kamal deployment
# (a .kamal/secrets file exists). Otherwise the installer refuses.
[requires]
any_of = [
  { file = ".kamal/secrets" },
]

[[env_vars]]
name = "KAMAL_VERSION"
required = false
default = ""
