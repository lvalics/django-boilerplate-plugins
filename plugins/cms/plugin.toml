id = "cms"
name = "CMS (Landing Pages + Blog)"
version = "2.1.0"
description = "Zone-based CMS scoped per site: landing pages, static content pages and a blog (posts, categories, tags), 20+ zone types, DaisyUI templates, testimonials, order/contact submissions with Turnstile, Redis caching. Requires the multi_domain plugin."
target = "django-boilerplate"
edition = "free"

python_dependencies = ["requests>=2.31"]

installed_apps = ["apps.cms"]

files = [
  "apps/cms/**",
  "templates/cms/**",
]

# Turnstile keys are read via django-environ's `env` (already defined in the target
# settings.py where this block is appended). Empty TURNSTILE_SECRET disables captcha
# verification. Rate-limit / cache defaults mirror the legacy plugin, renamed to CMS_*.
settings_append = """
TURNSTILE_KEY = env("TURNSTILE_KEY", default="")
TURNSTILE_SECRET = env("TURNSTILE_SECRET", default="")
CMS_RATE_LIMIT_IP_REQUESTS = 2
CMS_RATE_LIMIT_IP_WINDOW = 3600
CMS_RATE_LIMIT_EMAIL_REQUESTS = 3
CMS_RATE_LIMIT_EMAIL_WINDOW = 86400
CMS_EXEMPT_IPS = []
CMS_CACHE_TIMEOUT = 300
"""

post_install_notes = """
CMS (Landing Pages + Blog) installed. This plugin requires the multi_domain plugin
(apps.sites) to be installed FIRST - it provides the SiteProfile model that pages
are scoped to.

1. Run migrations:  make migrations ARGS='cms' && make migrate

2. Install the zone template presets (94 ready-made zone presets across 24 zone types):
     make manage ARGS='install_zone_templates'

3. Create content in Admin > CMS > Pages: set a title/slug, pick a Page type
   (landing / content / blog post), pick a site (or leave empty for all sites),
   then add zones. Zone content/config are JSON; copy defaults from Admin > Zone
   Templates. For blog posts, set an Author, Published date, Excerpt, Category and
   Tags (manage Categories/Tags under Admin > CMS).

   URL map (this plugin is mounted at the project root, appended LAST so all
   existing project routes always win):
     /<slug>/                      landing pages (root catch-all)
     /blog/                        blog list
     /blog/<slug>/                 blog post detail
     /blog/category/<slug>/        posts in a category
     /blog/tag/<slug>/             posts with a tag
     /c/<slug>/                    content pages
   The blog/content prefixes are configurable via CMS_POST_URL_PREFIX (default
   "blog") and CMS_CONTENT_URL_PREFIX (default "c").

4. Reserved slugs: landing pages live at /<slug>/, so a slug that collides with a
   top-level project route (admin, accounts, users, api, static, media, sitemap,
   robots, terms, celery-progress, and the blog/content prefixes) is rejected on
   save. Override the set with CMS_RESERVED_SLUGS.

5. Optional Turnstile bot protection for order forms: set TURNSTILE_KEY and
   TURNSTILE_SECRET in .env (free at https://dash.cloudflare.com/ > Turnstile).
   With an empty TURNSTILE_SECRET, captcha verification is skipped.

templates/cms/tailwind-safelist.html is required for styling - do not delete it
(see the README for why Tailwind's JIT needs it).
"""

[url_mappings]
"" = "apps.cms.urls"

[requires]
any_of = [ { app = "apps.sites" } ]

[[env_vars]]
name = "TURNSTILE_KEY"
description = "Cloudflare Turnstile site key (public) for order-form captcha widgets"
required = false
default = ""

[[env_vars]]
name = "TURNSTILE_SECRET"
description = "Cloudflare Turnstile secret key; empty disables captcha verification"
required = false
default = ""
